<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табель посещаемости</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a12;
  --card:#111120;
  --head:#0d0d1a;
  --brd:#1e1e35;
  --brd2:#252545;
  --plus:#10b981;
  --minus:#f43f5e;
  --tx:#e8edf5;
  --muted:#4a5068;
  --dim:#7a85a0;
  --acc:#4f6ef7;
  --acc2:#6366f1;
}
html,body{
  background:var(--bg);
  color:var(--tx);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 5% 0%,rgba(79,110,247,.1) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 95% 100%,rgba(99,102,241,.07) 0%,transparent 55%);
}
.page{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:20px 14px 60px;}

/* ══ HEADER ══ */
.hdr{margin-bottom:22px;animation:fadeDown .5s ease both;}
.hdr-tag{
  font-size:9px;letter-spacing:.22em;color:var(--acc);
  text-transform:uppercase;font-weight:700;
  display:flex;align-items:center;gap:6px;margin-bottom:6px;
}
.hdr-tag::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--acc);animation:pulse 2s infinite;
}
.hdr-title{
  font-family:'Unbounded',sans-serif;
  font-size:clamp(26px,7vw,42px);
  font-weight:900;line-height:1;
  background:linear-gradient(130deg,#fff 0%,#a5b4fc 50%,#67e8f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-info{
  display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;
}
.chip{
  background:var(--card);border:1px solid var(--brd);
  border-radius:8px;padding:5px 11px;
  font-size:11px;font-weight:600;color:var(--dim);
}
.chip b{color:var(--tx);}

/* ══ STATS ══ */
.stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-bottom:20px;
  animation:fadeUp .5s .1s ease both;
  opacity:0;animation-fill-mode:both;
}
.stat{
  background:var(--card);border:1px solid var(--brd);
  border-radius:12px;padding:12px 14px;
  position:relative;overflow:hidden;
  transition:transform .2s;
}
.stat:hover{transform:translateY(-2px);}
.stat::after{
  content:'';position:absolute;
  bottom:0;left:0;right:0;height:2px;
  background:var(--sc);
}
.stat-n{
  font-family:'Unbounded',sans-serif;
  font-size:26px;font-weight:900;
  color:var(--sc);line-height:1;
}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}

/* ══ DAY TABS ══ */
.tabs-wrap{
  margin-bottom:16px;
  animation:fadeUp .5s .15s ease both;
  opacity:0;animation-fill-mode:both;
}
.tabs-label{
  font-size:9px;letter-spacing:.15em;color:var(--muted);
  text-transform:uppercase;font-weight:600;
  margin-bottom:8px;padding-left:2px;
}
.tabs{
  display:flex;gap:6px;flex-wrap:wrap;
}
.tab{
  display:flex;flex-direction:column;align-items:center;
  gap:2px;
  background:var(--card);border:1px solid var(--brd);
  border-radius:12px;padding:10px 14px;
  cursor:pointer;
  transition:all .2s;
  min-width:64px;
  position:relative;
  overflow:hidden;
}
.tab::before{
  content:'';
  position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--acc);
  transform:scaleX(0);
  transition:transform .2s;
}
.tab:hover{border-color:var(--acc2);transform:translateY(-2px);}
.tab:hover::before{transform:scaleX(.5);}
.tab.active{
  background:var(--acc);
  border-color:var(--acc);
  box-shadow:0 4px 20px rgba(79,110,247,.4);
  transform:translateY(-3px);
}
.tab.active::before{transform:scaleX(1);background:#fff;}
.tab-name{
  font-family:'Unbounded',sans-serif;
  font-size:13px;font-weight:800;
  color:var(--tx);
  transition:color .2s;
}
.tab.active .tab-name{color:#fff;}
.tab-date{font-size:10px;color:var(--dim);font-weight:500;transition:color .2s;}
.tab.active .tab-date{color:rgba(255,255,255,.75);}
.tab-dot{
  width:6px;height:6px;border-radius:50%;
  margin-top:3px;
  transition:background .2s;
}
.tab.active .tab-dot{background:rgba(255,255,255,.6);}

/* dot colors by attendance */
.dot-good{background:var(--plus);}
.dot-bad{background:var(--minus);}
.dot-mix{background:var(--acc);}
.dot-empty{background:var(--muted);}

/* ══ TABLE CARD ══ */
.tcard{
  background:var(--card);
  border:1px solid var(--brd);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,.5);
  animation:fadeUp .5s .2s ease both;
  opacity:0;animation-fill-mode:both;
}
.tcard-top{
  padding:12px 16px;
  border-bottom:2px solid var(--brd);
  display:flex;align-items:center;
  justify-content:space-between;gap:8px;flex-wrap:wrap;
  background:var(--head);
}
.tcard-day{
  font-family:'Unbounded',sans-serif;
  font-size:14px;font-weight:800;color:var(--tx);
}
.tcard-date{font-size:11px;color:var(--dim);margin-top:1px;}
.tcard-badges{display:flex;gap:6px;}
.badge-stat{
  border-radius:20px;padding:3px 10px;
  font-size:10px;font-weight:700;
}
.badge-plus{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--plus);}
.badge-minus{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.3);color:var(--minus);}

/* ══ TABLE ══ */
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
::-webkit-scrollbar{height:3px;width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px;}

table{border-collapse:collapse;width:100%;min-width:300px;}

thead tr th{
  background:var(--head);
  border-bottom:2px solid var(--brd);
  padding:9px 12px;
  font-family:'Unbounded',sans-serif;
  font-size:9px;font-weight:700;
  color:var(--dim);text-align:left;
  letter-spacing:.08em;white-space:nowrap;
}
th.th-np{width:36px;text-align:center;border-right:1px solid var(--brd);}
th.th-name{padding-left:14px;}
th.th-status{text-align:center;width:80px;}

tbody tr{
  border-bottom:1px solid rgba(30,30,53,.8);
  transition:background .12s;
}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(odd){background:rgba(255,255,255,.01);}
tbody tr:hover{background:rgba(79,110,247,.06);}

/* row enter animation */
tbody tr{
  animation:rowSlide .3s ease both;
  opacity:0;
}
@keyframes rowSlide{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

td{height:50px;padding:0;vertical-align:middle;}
td.td-np{
  text-align:center;
  border-right:1px solid var(--brd);
  font-family:'Unbounded',sans-serif;
  font-size:10px;font-weight:700;color:var(--muted);
  width:36px;
}
td.td-name{
  padding:0 12px 0 14px;
  text-align:left;
}
.srow{display:flex;align-items:center;gap:9px;}
.av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;
  font-size:9px;font-weight:800;
  transition:transform .15s;
}
tbody tr:hover .av{transform:scale(1.1);}
.sname{font-size:12px;font-weight:600;color:var(--tx);}

td.td-status{
  text-align:center;
  width:80px;
  padding:0 10px;
}
.mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:36px;
  border-radius:10px;
  font-family:'Unbounded',sans-serif;
  font-size:16px;font-weight:900;
  border:1.5px solid transparent;
  animation:markPop .25s ease both;
}
@keyframes markPop{
  from{opacity:0;transform:scale(.5) rotate(-10deg);}
  to{opacity:1;transform:scale(1) rotate(0deg);}
}
.mark-plus{
  background:rgba(16,185,129,.15);
  border-color:rgba(16,185,129,.45);
  color:var(--plus);
}
.mark-minus{
  background:rgba(244,63,94,.14);
  border-color:rgba(244,63,94,.4);
  color:var(--minus);
}
.mark-empty{
  background:transparent;
  border-color:rgba(30,30,53,.7);
  color:rgba(74,80,104,.4);
  font-size:20px;
}

/* ══ ANIMATIONS ══ */
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ══ MOBILE ══ */
@media(max-width:480px){
  .tab{min-width:54px;padding:8px 10px;}
  .tab-name{font-size:12px;}
  .sname{font-size:11px;}
  .av{width:26px;height:26px;font-size:8px;}
  .mark{width:36px;height:30px;font-size:14px;}
  td{height:46px;}
}
</style>
</head>
<body>
<div class="page">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-tag">Журнал посещаемости</div>
  <div class="hdr-title">ТАБЕЛЬ</div>
  <div class="hdr-info">
    <div class="chip"><b id="cGrp">—</b></div>
    <div class="chip"><b id="cSubj">—</b></div>
    <div class="chip"><b id="cYear">—</b></div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat" style="--sc:var(--plus)">
    <div class="stat-n" id="sP">0</div>
    <div class="stat-l">+ Присутствуют</div>
  </div>
  <div class="stat" style="--sc:var(--minus)">
    <div class="stat-n" id="sA">0</div>
    <div class="stat-l">− Отсутствуют</div>
  </div>
  <div class="stat" style="--sc:var(--acc)">
    <div class="stat-n" id="sPct">—</div>
    <div class="stat-l">% посещаемости</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs-label">Выбери день</div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- TABLE -->
<div class="tcard">
  <div class="tcard-top">
    <div>
      <div class="tcard-day" id="tDay">—</div>
      <div class="tcard-date" id="tDate">—</div>
    </div>
    <div class="tcard-badges">
      <span class="badge-stat badge-plus" id="bP">+ 0</span>
      <span class="badge-stat badge-minus" id="bA">− 0</span>
    </div>
  </div>
  <div class="tscroll">
    <table>
      <thead>
        <tr>
          <th class="th-np">№</th>
          <th class="th-name">Фамилия, Имя студента</th>
          <th class="th-status">Отметка</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

</div><!-- .page -->

<script>
// ================================================================
//
//   ЧТО МЕНЯТЬ:
//
//   1. GRP, SUBJ, TEACHER, YEAR — название группы, предмет, препод, год
//   2. DAYS — дни недели с датами (удали лишние)
//   3. STUDENTS — имена и отметки
//      "+" = присутствовал
//      "-" = отсутствовал
//      ""  = не отмечено
//
//   Порядок отметок в week[] = порядок дней в DAYS
//   Пример: week[0] = Пн, week[1] = Вт, week[2] = Ср ...
//
// ================================================================

// ── НАСТРОЙКИ ──────────────────────────────
var GRP     = "ИТ-231";
var SUBJ    = "Информатика";
var TEACHER = "Иванова А.В.";
var YEAR    = 2025;

// ── ДНИ НЕДЕЛИ ─────────────────────────────
var DAYS = [
  { name: "Пн", date: "17.03.2025" },
  { name: "Вт", date: "18.03.2025" },
  { name: "Ср", date: "19.03.2025" },
  { name: "Чт", date: "20.03.2025" },
  { name: "Пт", date: "21.03.2025" }
];

// ── СТУДЕНТЫ ────────────────────────────────
//                                      Пн    Вт    Ср    Чт    Пт
var STUDENTS = [
//                                              Пн    Вт    Ср    Чт    Пт
  { n: "Авдеев Артём Дмитриевич",          week: ["",   "",   "",   "",   "" ] },
  { n: "Будкевич Евгений Евгеньевич",      week: ["",   "",   "",   "",   "" ] },
  { n: "Горошко Дмитрий Константинович",   week: ["",   "",   "",   "",   "" ] },
  { n: "Долгодилин Дмитрий Сергеевич",     week: ["",   "",   "",   "",   "" ] },
  { n: "Другач Ярослав Дмитриевич",        week: ["",   "",   "",   "",   "" ] },
  { n: "Каплевский Фёдор Николаевич",      week: ["",   "",   "",   "",   "" ] },
  { n: "Касенко Виктор Андреевич",         week: ["",   "",   "",   "",   "" ] },
  { n: "Корнилов Никита Алексеевич",       week: ["",   "",   "",   "",   "" ] },
  { n: "Корнилов Сергей Алексеевич",       week: ["",   "",   "",   "",   "" ] },
  { n: "Латушкин Сергей Михайлович",       week: ["",   "",   "",   "",   "" ] },
  { n: "Марков Даниил Артурович",          week: ["",   "",   "",   "",   "" ] },
  { n: "Мартынов Александр Андреевич",     week: ["",   "",   "",   "",   "" ] },
  { n: "Пахомчик Максим Денисович",        week: ["",   "",   "",   "",   "" ] },
  { n: "Плешков Даниил Иванович",          week: ["",   "",   "",   "",   "" ] },
  { n: "Ракицкий Александр Эдуардович",    week: ["",   "",   "",   "",   "" ] },
  { n: "Семенов Даниил Александрович",     week: ["",   "",   "",   "",   "" ] },
  { n: "Симаков Максим Дмитриевич",        week: ["",   "",   "",   "",   "" ] },
  { n: "Слепцов Павел Алексеевич",         week: ["",   "",   "",   "",   "" ] },
  { n: "Тимашев Иван Алексеевич",          week: ["",   "",   "",   "",   "" ] },
  { n: "Тишковец Павел Вячеславович",      week: ["",   "",   "",   "",   "" ] },
  { n: "Шадурский Максим Юрьевич",         week: ["",   "",   "",   "",   "" ] },
  { n: "Шестакович Назар Николаевич",      week: ["",   "",   "",   "",   "" ] },
  { n: "Шибеко Павел Евгеньевич",          week: ["",   "",   "",   "",   "" ] },
  { n: "Щерба Максим Владимирович",        week: ["",   "",   "",   "",   "" ] },
  { n: "Щуко Никита Сергеевич",            week: ["",   "",   "",   "",   "" ] }
];

// ================================================================
//  КОД — НЕ ТРОГАЙ
// ================================================================
(function(){

var COLORS=["#4f6ef7","#10b981","#f43f5e","#f59e0b","#7c5cfc","#06b6d4","#f97316","#ec4899","#22c55e","#8b5cf6","#0ea5e9","#14b8a6","#eab308","#84cc16","#a855f7","#3d5cff","#00c48c","#ff4757","#ffb800","#9b5de5"];

var curDay = 0;

/* шапка */
document.getElementById('cGrp').textContent  = GRP;
document.getElementById('cSubj').textContent = SUBJ;
document.getElementById('cYear').textContent = YEAR;

/* глобальная статистика */
function calcGlobal(){
  var p=0,a=0;
  STUDENTS.forEach(function(s){
    DAYS.forEach(function(d,di){
      var v=s.week[di]||'';
      if(v==='+')p++; else if(v==='-')a++;
    });
  });
  var t=p+a;
  var pct=t>0?Math.round(p/t*100):null;
  document.getElementById('sP').textContent=p;
  document.getElementById('sA').textContent=a;
  document.getElementById('sPct').textContent=pct!==null?pct+'%':'—';
}
calcGlobal();

/* dot color для таба */
function dotClass(di){
  var p=0,a=0;
  STUDENTS.forEach(function(s){
    var v=s.week[di]||'';
    if(v==='+')p++; else if(v==='-')a++;
  });
  if(p===0&&a===0) return 'dot-empty';
  if(a===0) return 'dot-good';
  if(p===0) return 'dot-bad';
  return 'dot-mix';
}

/* TABS */
var tabsEl=document.getElementById('tabs');
DAYS.forEach(function(d,i){
  var t=document.createElement('div');
  t.className='tab'+(i===0?' active':'');
  t.innerHTML='<span class="tab-name">'+d.name+'</span>'
    +'<span class="tab-date">'+d.date+'</span>'
    +'<span class="tab-dot '+dotClass(i)+'"></span>';
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');
    curDay=i;
    renderTable(i);
  });
  tabsEl.appendChild(t);
});

/* TABLE */
function renderTable(di){
  var day=DAYS[di];
  document.getElementById('tDay').textContent=day.name+' — '+day.date;
  document.getElementById('tDate').textContent=GRP+' · '+SUBJ;

  var p=0,a=0;
  var b='';

  for(var i=0;i<STUDENTS.length;i++){
    var s=STUDENTS[i];
    var v=s.week[di]||'';
    if(v==='+')p++; else if(v==='-')a++;

    var ini=s.n.split(' ').filter(Boolean).map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase()||'?';
    var c=COLORS[i%COLORS.length];

    var markCls=v==='+'?'mark mark-plus':v==='-'?'mark mark-minus':'mark mark-empty';
    var markTxt=v==='+'?'+':v==='-'?'−':'·';

    b+='<tr style="animation-delay:'+(i*0.022)+'s">'
      +'<td class="td-np">'+(i+1)+'</td>'
      +'<td class="td-name"><div class="srow">'
      +'<div class="av" style="background:'+c+'20;color:'+c+';border:1.5px solid '+c+'40">'+ini+'</div>'
      +'<span class="sname">'+s.n+'</span>'
      +'</div></td>'
      +'<td class="td-status"><div class="'+markCls+'" style="animation-delay:'+(i*0.022+.05)+'s">'+markTxt+'</div></td>'
      +'</tr>';
  }

  document.getElementById('tbody').innerHTML=b;
  document.getElementById('bP').textContent='+ '+p;
  document.getElementById('bA').textContent='− '+a;
}

renderTable(0);

})();
</script>
</body>
</html>
